<head>

<style>
.btn-add-cart{
	background-color:#28a745;
	color:white;
	border:none;
	padding:10px;
	border-radius:5px;
	font-size:14px;
	font-weight:bold;
	cursor:pointer;
	transition:background 0.2s;
	width:100%;
}
.btn-add-cart:hover{
	background:#218838;
}
</style>

<body>
<table>
<tr>
<td colspan="2"><img src="Screenshot 2026-05-22 151907.png" width="200" height="200"/></td>
<td>ONE PIECE - One Piece Gakuen 7</td>
<td style="color:#F00">140.000đ<br/>156.000đ -10%</td>
<td><input type="button" value="Mua Ngay"></td>
<td><button onclick="them('One Piece Gakuen 7','140000')" class="btn-add-cart">Thêm vào giỏ</button></td>
</tr>
<tr>
<td colspan="2"><img src="Screenshot 2026-05-22 152221.png" width="200" height="200"/></td>
<td>ONE PIECE - One Piece Gakuen 6</td>
<td style="color:#F00">121.000đ<br/>135.000đ -10%</td>
<td><input type="button" value="Mua Ngay"></td>
<td><button onclick="them('One Piece Gakuen 6','121000')" class="btn-add-cart">Thêm vào giỏ</button></td>
</tr>
<tr>
<td colspan="2"><img src="Screenshot 2026-05-22 152405.png" width="200" height="200"/></td>
<td>ONE PIECE - One Piece Gakuen 4</td>
<td style="color:#F00">118.000đ<br/>132.000đ -10%</td>
<td><input type="button" value="Mua Ngay"></td>
<td><button onclick="them('One Piece Gakuen 4','118000')" class="btn-add-cart">Thêm vào giỏ</button></td>
</tr>
</table>
<script>
    const buttons=document.querySelectorAll('.btn-add-cart'); 
	buttons.forEach(button=>{
		button.addEventListener('click',()=>{
			button.innerText="Đã thêm";
			button.style.backgroudColor="#ffc107";
			button.style.color="#000";
			setTimeout(()=>{
				button.innerText="Thêm vào giỏ";
				button.style.backgroudColor="#28a745";
				button.style.color="white";
			},1000);
		});
	});
	</script>
    <script>
function them(ten, gia) {
  var gio = JSON.parse(localStorage.getItem('gio') || '[]');
  var i = gio.findIndex(function(x){ return x.ten===ten; });
  if(i>=0) gio[i].sl++;
  else gio.push({ten:ten, gia:gia, sl:1});
  localStorage.setItem('gio', JSON.stringify(gio));
  alert('Đã thêm: ' + ten);
}
</script>
